interface:
  display_name: "Swing Trading 3% Screen"
  short_description: "Analyze a user-provided Screener screen with thesis extraction, bounded-parallel fundamentals, ranked technical review, and practical 2% to 4% stop survivability"
  default_prompt: "Use $swing-trading-3pct-screen to analyze a user-provided Screener.in screen. First extract the screen thesis from the screen title and visible filters, then build the full universe and run bounded-parallel fundamental sub-agents to create the fundamental ranking before any technical work begins. After the fundamental ranking exists, run technical analysis one TradingView sub-agent at a time because TradingView MCP chart state is shared and race-prone. Each handoff must include the goal, context, few-shot examples, and the output schema. Technical analysis must evaluate EMA context, support and resistance zones, supply and demand zones, chart patterns, and market structure across weekly, daily, 60, 30, and 15 minute timeframes. Synthesize the five-file report set with reviewed versus pending technical status made explicit."
