interface:
  display_name: "Swing Trading 3% Screen"
  short_description: "Cache-aware momentum screen analysis with markdown fundamental dossiers first, sequential TradingView technical review second, and verbose per-stock technical dossiers for every reviewed name"
  default_prompt: "Use $swing-trading-3pct-screen to analyze a user-provided Screener.in screen. Extract the screen thesis, build the full universe, read docs/swing-trading/fundamentals/index.md, classify each stock as runtime missing, fresh, review_due, or hard_stale, refresh only the required fundamental dossiers with one new sub-agent per stock and at most 6 inflight, rank the full universe from stock dossiers only, then run one technical sub-agent per stock strictly sequentially across weekly, daily, 60, 30, and 15 minute charts using EMA context, market structure, chart patterns, support and resistance, supply and demand, and volume analysis around the practical 2% to 4% stop zone, and write a verbose technical dossier for every technically reviewed stock plus the run report set."
