interface:
  display_name: "Swing Trading 3% Screen"
  short_description: "Cache-aware momentum screen analysis with fundamental dossiers first, then mode-specific technical review via TradingView MCP or API fallback"
  default_prompt: "Use $swing-trading-3pct-screen to analyze a user-provided Screener.in screen. Extract the screen thesis, build the full universe, read docs/swing-trading/fundamentals/index.md, classify each stock as runtime missing, fresh, review_due, or hard_stale, refresh only the required fundamental dossiers with one new sub-agent per stock and at most 6 inflight, rank the full universe from stock dossiers only, then select technical_data_mode. Use TradingView MCP when connected and verified; when TradingView MCP is disconnected or unreachable, use api_fallback and make each one-stock technical sub-agent run this skill's local fetch_stock_data.py and fetch_indicator_bundle.py scripts inside its own task. Do not write ad hoc Python scripts for API fallback; patch bundled scripts if needed. Run TradingView MCP technical sub-agents strictly one at a time, but run API fallback technical sub-agents in parallel with a hard cap of 6 inflight workers. Every technical worker must cover weekly, daily, 60, 30, and 15 minute charts using EMA context, market structure, chart patterns, support and resistance, supply and demand, and volume analysis around the practical 2% to 4% stop zone, and write a crisp technical dossier for every technically reviewed stock plus the run report set."
