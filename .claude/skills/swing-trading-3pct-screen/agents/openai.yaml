interface:
  display_name: "Swing Trading 3% Screen"
  short_description: "Cache-aware momentum screen analysis with markdown fundamental dossiers first and sequential technical review second"
  default_prompt: "Use $swing-trading-3pct-screen to analyze a user-provided Screener.in screen. Extract the screen thesis, build the full universe, read docs/swing-trading/fundamentals/index.md, and classify each stock as runtime missing, fresh, review_due, or hard_stale. Refresh all missing and hard_stale names plus exactly the top 3 review_due names by dispatching fundamental sub-agents multiple at a time when useful, but each fundamental sub-agent must process exactly one stock and only analyze that stock. The main agent must compare stock dossiers against each other and build the full-universe fundamental ranking from those dossiers only. After the fundamental ranking exists, run one technical sub-agent per stock strictly sequentially around a practical 2% to 4% stop zone using EMA context, support and resistance zones, supply and demand zones, chart patterns, and market structure across weekly, daily, 60, 30, and 15 minute timeframes. Never batch multiple stocks into one worker. Write the five-file report set with reviewed versus pending technical status made explicit."
